global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: zaps-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - zaps-backend:3000

  - job_name: zaps-contracts
    metrics_path: /metrics/contracts
    static_configs:
      - targets:
          - zaps-server:3000
