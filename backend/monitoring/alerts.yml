groups:
  - name: zaps-backend
    rules:
      - alert: HighHttpErrorRate
        expr: sum(rate(http_errors_total[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZAPS backend HTTP error rate is above 5%

      - alert: CriticalHttpErrorRate
        expr: sum(rate(http_errors_total[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: ZAPS backend HTTP error rate is above 10%

      - alert: ApiRateLimitPressure
        expr: sum(rate(rate_limit_events_total{outcome="blocked"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: API rate limit blocks are elevated

      - alert: ComplianceBlockedTransaction
        expr: increase(compliance_screenings_total{decision="blocked"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Compliance screening blocked at least one transaction

      - alert: BackendDown
        expr: up{job="zaps-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: ZAPS backend Prometheus scrape target is down

      - alert: PaymentSuccessRateLow
        expr: (sum(rate(payment_transactions_total{status="completed"}[10m])) / clamp_min(sum(rate(payment_transactions_total{status="created"}[10m])), 1)) < 0.9
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: ZAPS payment success rate is below 90% over 10m

      - alert: MerchantPaymentSuccessRateLow
        expr: (sum(rate(payment_transactions_total{status="completed"}[10m])) by (merchant_id) / clamp_min(sum(rate(payment_transactions_total{status="created"}[10m])) by (merchant_id), 1)) < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZAPS merchant payment success rate is below 90% over 10m

      - alert: NoPaymentsCreated
        expr: increase(payment_transactions_total{status="created"}[15m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: No payments created in the last 15 minutes

  - name: zaps-contracts
    rules:
      - alert: SorobanRpcDown
        expr: soroban_rpc_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Soroban RPC is unreachable for contract operations

      - alert: SorobanEventPollLag
        expr: soroban_event_poll_lag_ledgers > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Contract event indexer is lagging behind the network

      - alert: SorobanEventPollStalled
        expr: soroban_event_poll_lag_ledgers > 200
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Contract event indexer is critically stalled

      - alert: ContractPaused
        expr: contract_paused == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: A Soroban contract is paused and blocking payments

      - alert: ContractPaymentFailureSpike
        expr: contract_payment_failure_rate_percent > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: On-chain payment failure rate exceeds 10%

      - alert: ContractUnreachable
        expr: contract_reachable == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: A monitored Soroban contract failed health checks
